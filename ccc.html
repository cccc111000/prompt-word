<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>顏麗真專屬提示詞機器</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          animation: {
            'fade-in': 'fadeIn 0.5s ease-out forwards',
            'slide-in': 'slideIn 0.5s ease-out forwards',
            'zoom-in': 'zoomIn 0.3s ease-out forwards',
          },
          keyframes: {
            fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
            slideIn: { '0%': { opacity: '0', transform: 'translateY(1rem)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
            zoomIn: { '0%': { opacity: '0', transform: 'scale(0.95)' }, '100%': { opacity: '1', transform: 'scale(1)' } },
          }
        }
      }
    }
  </script>
  
  <!-- 載入 Lucide 圖示庫 -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* 隱藏捲動軸，保持畫面乾淨但可捲動 */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-200 font-sans selection:bg-blue-200 dark:selection:bg-blue-800 transition-colors duration-300 min-h-screen flex flex-col">

  <!-- 頂部導覽列 -->
  <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-20 transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2 text-blue-600 dark:text-blue-400">
        <i data-lucide="sparkles" class="w-6 h-6"></i>
        <h1 class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">顏麗真專屬提示詞機器</h1>
      </div>
      <div class="flex items-center gap-4">
        <div class="text-sm text-slate-500 dark:text-slate-400 hidden sm:block">
          與 AI 對話自動完成表單 ➔ 一鍵生成教案與簡報
        </div>
        <button id="theme-toggle" class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors" title="切換深色/淺色模式">
          <i data-lucide="sun" id="icon-sun" class="w-5 h-5 hidden dark:block"></i>
          <i data-lucide="moon" id="icon-moon" class="w-5 h-5 block dark:hidden"></i>
        </button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 py-6 flex flex-col gap-6 w-full flex-1">
    
    <!-- 上半部：表單與聊天室 -->
    <div class="grid lg:grid-cols-12 gap-6 items-start">
      
      <!-- 左側：表單區塊 -->
      <div class="lg:col-span-7 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 animate-slide-in transition-colors duration-300">
        <div class="flex items-center justify-between mb-5">
          <h2 class="text-lg font-bold flex items-center gap-2 dark:text-white">
            <i data-lucide="file-text" class="w-5 h-5 text-blue-500 dark:text-blue-400"></i>
            教案參數設定
          </h2>
          <button id="btn-reset" class="flex items-center gap-1.5 px-3 py-1.5 text-sm font-medium rounded-lg transition-all duration-300 text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/20 hover:bg-red-100 dark:hover:bg-red-900/40">
            <i data-lucide="rotate-ccw" id="icon-reset" class="w-4 h-4"></i>
            <span id="text-reset">重置全部</span>
          </button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- 產生表單欄位 -->
          <!-- 教學科目 -->
          <div>
            <div class="flex items-center justify-between mb-1">
              <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">教學科目 <span class="text-red-500">*</span></label>
              <div id="badge-subject"></div>
            </div>
            <div class="relative">
              <input type="text" id="input-subject" list="subject-list" placeholder="例如：國語、數學、英文..." class="w-full rounded-lg border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 p-2.5 pr-14 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" />
              <button id="clear-subject" class="hidden absolute right-7 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-red-500 dark:hover:text-red-400 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
              <datalist id="subject-list">
                <option value="國語文"></option><option value="英語文"></option><option value="數學"></option><option value="自然科學"></option><option value="社會"></option><option value="藝術"></option><option value="綜合活動"></option><option value="科技"></option><option value="健康與體育"></option>
              </datalist>
            </div>
          </div>

          <!-- 教學主題 -->
          <div>
            <div class="flex items-center justify-between mb-1">
              <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">教學主題 <span class="text-red-500">*</span></label>
              <div id="badge-topic"></div>
            </div>
            <div class="relative">
              <input type="text" id="input-topic" placeholder="例如：光合作用、台灣歷史..." class="w-full rounded-lg border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 p-2.5 pr-10 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" />
              <button id="clear-topic" class="hidden absolute right-2 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-red-500 dark:hover:text-red-400 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
          </div>

          <!-- 適用年級 -->
          <div>
            <div class="flex items-center justify-between mb-1">
              <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">適用年級 <span class="text-red-500">*</span></label>
              <div id="badge-grade"></div>
            </div>
            <div class="relative">
              <input type="text" id="input-grade" placeholder="例如：國小三年級..." class="w-full rounded-lg border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 p-2.5 pr-10 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" />
              <button id="clear-grade" class="hidden absolute right-2 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-red-500 dark:hover:text-red-400 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
          </div>

          <!-- 課程時長 -->
          <div>
            <div class="flex items-center justify-between mb-1">
              <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">課程時長</label>
              <div id="badge-duration"></div>
            </div>
            <div class="relative">
              <input type="text" id="input-duration" list="duration-list" placeholder="例如：45 分鐘、2 節課..." class="w-full rounded-lg border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 p-2.5 pr-14 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" />
              <button id="clear-duration" class="hidden absolute right-7 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-red-500 dark:hover:text-red-400 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
              <datalist id="duration-list">
                <option value="40 分鐘 (國小)"></option><option value="45 分鐘 (國中)"></option><option value="50 分鐘 (高中/大學)"></option><option value="90 分鐘 (連排兩節)"></option><option value="120 分鐘 (工作坊)"></option>
              </datalist>
            </div>
          </div>

          <!-- 教學風格 -->
          <div>
            <div class="flex items-center justify-between mb-1">
              <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">教學風格</label>
              <div id="badge-style"></div>
            </div>
            <div class="relative">
              <input type="text" id="input-style" list="teaching-styles" placeholder="例如：專題導向、生活化..." class="w-full rounded-lg border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 p-2.5 pr-14 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" />
              <button id="clear-style" class="hidden absolute right-7 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-red-500 dark:hover:text-red-400 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
              <datalist id="teaching-styles">
                <option value="活潑有趣，多互動"></option><option value="嚴謹專業，重邏輯"></option><option value="生活化，舉例豐富"></option><option value="啟發式，引導提問"></option><option value="專題導向 (PBL)"></option><option value="遊戲化學習 (Gamification)"></option>
              </datalist>
            </div>
          </div>

          <!-- 簡報頁數 -->
          <div>
            <div class="flex items-center justify-between mb-1">
              <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">簡報頁數</label>
              <div id="badge-slideCount"></div>
            </div>
            <div class="relative">
              <input type="text" id="input-slideCount" list="slide-counts" placeholder="例如：10頁、15-20頁..." class="w-full rounded-lg border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 p-2.5 pr-14 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" />
              <button id="clear-slideCount" class="hidden absolute right-7 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-red-500 dark:hover:text-red-400 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
              <datalist id="slide-counts">
                <option value="根據簡報內容自動調配"></option><option value="5-8 頁 (精華短講)"></option><option value="10-15 頁 (標準課堂)"></option><option value="15-20 頁 (詳細解說)"></option>
              </datalist>
            </div>
          </div>

          <!-- 簡報風格 (佔據兩格寬度，讓內容更好顯示) -->
          <div class="md:col-span-2">
            <div class="flex items-center justify-between mb-1">
              <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 flex items-center gap-1">
                <i data-lucide="presentation" class="w-3.5 h-3.5"></i> 簡報風格 (視覺設計)
                <!-- 顯眼的提示標籤 -->
                <span class="ml-2 px-2.5 py-0.5 rounded text-[11px] font-bold bg-amber-100 text-amber-700 dark:bg-amber-900/60 dark:text-amber-400 border border-amber-300 dark:border-amber-700 shadow-sm animate-pulse flex items-center gap-1">
                  <i data-lucide="mouse-pointer-click" class="w-3 h-3"></i> 點選輸入框，瀏覽豐富的風格選項！
                </span>
              </label>
              <div id="badge-presentationStyle"></div>
            </div>
            <div class="relative">
              <input type="text" id="input-presentationStyle" list="presentation-styles" placeholder="點擊此處選擇風格，或直接輸入..." class="w-full rounded-lg border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 p-2.5 pr-14 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" />
              <button id="clear-presentationStyle" class="hidden absolute right-7 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-red-500 dark:hover:text-red-400 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
              <datalist id="presentation-styles">
                <!-- 一、 經典與商務 (Classic & Corporate) -->
                <option value="【極簡主義】Minimalist：大量留白、單色調、大字體。視覺乾淨俐落，讓觀眾專注於核心內容。"></option>
                <option value="【專業商務】Corporate Professional：中性藍灰色調、圖表導向、排版嚴謹。具備強烈的信賴感，適合主管會議。"></option>
                <option value="【執行長風格】Executive：金屬漸層質感、精緻化圖標。適合高階提案、董事會與財務報告，展現頂級專業。"></option>
                <option value="【數據驅動】Data-Driven：強調互動式圖表、樞紐分析呈現。適合數據分析報告與 KPI 檢討。"></option>
                <option value="【單色調】Monochrome：僅使用單一顏色（如全藍、全灰）的深淺明暗變化，帶來極致的視覺統一感。"></option>
                <option value="【高對比】High Contrast：黑白對比或強烈互補色，讓文字極度醒目，適合光線明亮的大型演講。"></option>
                <option value="【扁平化設計】Flat Design：純色區塊與幾何圖形，捨棄立體陰影。資訊傳遞直觀、清晰且具現代感。"></option>

                <!-- 二、 現代科技與未來派 (Modern Tech & Futuristic) -->
                <option value="【現代風】Modern：3D 漸層、流線型排版。適合科技新品發布與現代感強烈的展示。"></option>
                <option value="【蘋果風】Apple Style：深色或純色背景、極簡大字、居中平鋪佈局。營造頂級設計導向的演講氛圍。"></option>
                <option value="【深色模式】Dark Mode：深黑高對比、金屬奢華感。降低視覺疲勞，極具沉穩與高科技 Demo 氛圍。"></option>
                <option value="【未來主義】Futuristic：霓虹線條、動態粒子、科幻發光元素。充滿速度感，適合 AI 或區塊鏈主題。"></option>
                <option value="【賽博龐克】Cyberpunk：螢光粉、青綠等高對比霓虹色調搭配極暗背景。帶有超現實的高科技反烏托邦色彩。"></option>
                <option value="【霓虹發光】Neon Glow：暗色背景加上發光邊框與螢光字體。視覺衝擊力極強，強調破壞性創新。"></option>

                <!-- 三、 UI 介面與材質質感 (UI Material & Texture) -->
                <option value="【玻璃擬態】Glassmorphism：半透明毛玻璃效果、層次感。適合 App 介面 Demo 與軟體展示。"></option>
                <option value="【液態玻璃】Liquid Glass：流動感半透明。帶有新世代科技大廠的設計語彙與未來感介面展示。"></option>
                <option value="【新擬物化】Neumorphism：結合扁平化與微小陰影，區塊如凸起或凹陷。視覺柔和且具備高級科技手感。"></option>
                <option value="【質感設計】Material Design：卡片式排版、鮮明色彩與真實物理陰影。畫面極具條理且符合直覺。"></option>

                <!-- 四、 敘事與資訊視覺化 (Narrative & Infographic) -->
                <option value="【視覺敘事】Visual Story：全幅高畫質照片、連續性的故事敘述排版。適合品牌故事與行銷推廣。"></option>
                <option value="【創意拼貼】Creative：自定義插圖、多重紋理疊加。版面自由度高，適合廣告企劃與個人作品集。"></option>
                <option value="【時間軸】Timeline：以時間軸動畫為主體，強調里程碑。適合專案進度匯報與歷史回顧。"></option>
                <option value="【資訊圖表】Infographic：將複雜數據與流程圖標化。極大化資訊傳遞效率，適合複雜概念解說。"></option>

                <!-- 五、 藝術美學與次文化潮流 (Artistic & Subculture) -->
                <option value="【奢華美學】Luxury Aesthetic：黑金、玫瑰金搭配細緻襯線字體。呈現高貴、典雅且精緻的昂貴感。"></option>
                <option value="【包浩斯風格】Bauhaus：基礎幾何圖形與紅黃藍原色搭配。排版具備強烈結構感與現代藝術氣息。"></option>
                <option value="【新粗獷主義】Neo-Brutalism：粗獷大色塊、硬邊線條暴露、不加修飾的粗體字。適合反傳統品牌與藝術展。"></option>
                <option value="【孟菲斯設計】Memphis Design：大膽對比配色的不規則圖形與波浪點陣。活潑俏皮，適合創意年輕主題。"></option>
                <option value="【千禧風】Y2K Aesthetic：金屬色、立體氣泡字、低畫質像素元素。充滿 2000 年代初期的復古未來流行感。"></option>
                <option value="【龐克拼貼】Punk Collage：撕裂感拼貼、髒污噪點效果。極具叛逆張力，適合潮流 Zine 與音樂活動。"></option>

                <!-- 六、 溫馨生活與插畫風格 (Lifestyle & Illustration) -->
                <option value="【北歐風】Scandinavian：木質色、米白等自然溫暖色調。排版乾淨，給人放鬆、舒適的質感氛圍。"></option>
                <option value="【復古風】Retro / Vintage：暖棕色調、噪點效果、仿舊紙張與老式字體。喚起懷舊情感，適合文化活動。"></option>
                <option value="【粉彩柔和】Soft Pastel：低飽和馬卡龍色系。視覺感受輕盈、溫柔且無攻擊性。"></option>
                <option value="【水彩風】Watercolor：邊緣暈染筆刷效果。充滿強烈的人文氣息與手作溫度。"></option>
                <option value="【趣味風】Playful：顏色鮮豔、Q 彈感排版與卡通圖示。適合團隊培訓或產品趣味說明。"></option>
                <option value="【可愛萌系】Cute Kawaii：粉嫩色系、圓潤線條與手繪表情。極具親和力，適合兒童產品與年輕客群。"></option>
                <option value="【素樸有機】Naïve / Organic：不規則手繪感與有機形狀。隨性自然，適合創意腦力激盪與工作坊。"></option>
              </datalist>
            </div>
          </div>

          <!-- 特殊要求 -->
          <div class="md:col-span-2">
            <div class="flex items-center justify-between mb-1">
              <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">特殊要求 (選填)</label>
              <div id="badge-special"></div>
            </div>
            <div class="relative">
              <input type="text" id="input-special" placeholder="例如：需要結合戶外活動..." class="w-full rounded-lg border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100 p-2.5 pr-10 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500" />
              <button id="clear-special" class="hidden absolute right-2 top-1/2 -translate-y-1/2 p-1 text-slate-400 hover:text-red-500 dark:hover:text-red-400 transition-colors"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
          </div>

          <!-- 生成按鈕 -->
          <div class="md:col-span-2 mt-4">
            <button id="btn-generate" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 dark:disabled:bg-blue-800 text-white font-medium py-3 rounded-lg transition-colors flex items-center justify-center gap-2 shadow-sm">
              <i data-lucide="sparkles" id="icon-generate-sparkles" class="w-5 h-5"></i>
              <i data-lucide="loader-2" id="icon-generate-loader" class="w-5 h-5 animate-spin hidden"></i>
              <span id="text-generate">一鍵生成專屬教案與簡報內容</span>
            </button>
          </div>
        </div>
      </div>

      <!-- 右側：AI 顧問聊天室 -->
      <div class="lg:col-span-5 relative">
        <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden sticky top-24 flex flex-col h-[600px] transition-colors duration-300">

    function parseMarkdownToHTML(text) {
      if (!text) return '';
      return text.split('\n').map(line => {
        const trimmedLine = line.trim();
        if (!trimmedLine) return '<div class="h-2"></div>'; 
        
        let htmlLine = trimmedLine;
        // Parse bold
        htmlLine = htmlLine.replace(/\*\*(.*?)\*\*/g, '<strong class="text-slate-900 dark:text-slate-200">$1</strong>');
        
        if (trimmedLine.startsWith('# ')) return `<h1 class="text-xl font-bold mt-5 mb-3 text-slate-900 dark:text-white border-b border-slate-200 dark:border-slate-700 pb-2">${htmlLine.replace('# ', '')}</h1>`;
        if (trimmedLine.startsWith('## ')) return `<h2 class="text-lg font-bold mt-6 mb-3 text-indigo-700 dark:text-indigo-400">${htmlLine.replace('## ', '')}</h2>`;
        if (trimmedLine.startsWith('### ')) return `<h3 class="text-base font-bold mt-5 mb-2 text-slate-800 dark:text-slate-200 bg-slate-100 dark:bg-slate-800 inline-block px-2 py-1 rounded">${htmlLine.replace('### ', '')}</h3>`;
        
        if (trimmedLine.startsWith('- ') || trimmedLine.startsWith('* ')) {
          return `<li class="ml-5 list-disc mb-1.5 pl-1">${htmlLine.substring(2)}</li>`;
        }
        
        if (/^\d+\.\s/.test(trimmedLine)) {
          return `<div class="ml-2 font-medium mt-3 mb-1 text-slate-800 dark:text-slate-200">${htmlLine}</div>`;
        }

        return `<p class="mb-2">${htmlLine}</p>`;
      }).join('');
    }

    async function callGeminiAPI(userText, isContentGeneration = false, sysPrompt = null) {
      // 更新：使用最穩定版本的 gemini-2.5-flash
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      
      let payloadContents;
      let systemInstructionText;

      if (isContentGeneration) {
        payloadContents = [{ role: 'user', parts: [{ text: userText }] }];
        systemInstructionText = "你是一位擁有20年教學經驗的資深教育專家與教案設計師。請發揮創意與專業，提供具體、生動且符合現代教學趨勢的可執行內容，避免空泛的描述。";
      } else {
        payloadContents = state.messages.map(msg => ({
          role: msg.role === 'assistant' ? 'model' : 'user',
          parts: [{ text: msg.content }]
        }));
        payloadContents.push({ role: 'user', parts: [{ text: userText }] });
        
        systemInstructionText = `你是一位專業的「教案設計助理」。
你的目標是透過親切的對話，幫助老師釐清教學需求，並自動幫他們填寫設定表單。
你可以詢問他們：教學科目、教學主題、適用年級、課程時長、期望的教學風格、期待的簡報風格(視覺設計)、簡報頁數、特殊要求。

【重要填表指示：專業化參數】
當你從對話中擷取資訊轉換為 JSON 時，請「不要」只是照抄使用者的口語字詞，請主動將其擴充、轉化為「專業、清晰且具體的教學參數」。
當你從對話中得知任何上述資訊時，【必須】在回覆的最尾端加上一段 JSON 格式的代碼區塊，系統會讀取該區塊來自動更新表單。
JSON 格式範例：
\`\`\`json
{
  "subject": "自然科學",
  "topic": "光合作用",
  "grade": "國小五年級",
  "duration": "45 分鐘",
  "slideCount": "10-12 頁",
  "style": "結合生活實例與小組競賽的探索式學習",
  "presentationStyle": "極簡主義 (Minimalist)：大量留白、單色調、大字體，視覺乾淨俐落",
  "special": "班上有兩位過動症學生，需要安排動態活動與明確指令"
}
\`\`\`
如果你只知道部分資訊，就只回傳該欄位即可。絕對不要在正常對話內容中提及 JSON。`;
      }

      let retries = 0;
      while (retries < 3) {
        try {
          if (!apiKey) {
             throw new Error("請先在程式碼中設定 API Key");
          }

          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: payloadContents,
              systemInstruction: { parts: [{ text: systemInstructionText }] }
            })
          });

          if (!response.ok) {
             const errorData = await response.json().catch(() => null);
             const errorMsg = errorData && errorData.error ? errorData.error.message : `HTTP status: ${response.status}`;
             throw new Error(errorMsg);
          }
          
          const data = await response.json();
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
          if (text) return text;
          throw new Error("API 回應格式不正確");
          
        } catch (error) {
          console.error("API Call Error:", error);
          retries++;
          if (retries >= 3) {
             // 顯示更具體的錯誤訊息幫助除錯
             return isContentGeneration 
                ? `生成失敗，錯誤訊息：\n${error.message}\n請檢查您的 API Key 或稍後再試。` 
                : `連線失敗 (${error.message})，請檢查 API Key 或網路連線。`;
          }
          await new Promise(resolve => setTimeout(resolve, 1000 * Math.pow(2, retries - 1)));
        }
      }
    }

    async function handleSendMessage() {
      const chatInput = document.getElementById('chat-input');
      const userText = chatInput.value.trim();
      if (!userText || state.isLoading) return;

      chatInput.value = '';
      state.messages.push({ role: 'user', content: userText });
      state.isLoading = true;
      updateChatUI();

      const replyText = await callGeminiAPI(userText, false);
      
      let displayText = replyText;
      const jsonMatch = replyText.match(/```json\n([\s\S]*?)\n```/);
      if (jsonMatch) {
        try {
          const parsedData = JSON.parse(jsonMatch[1]);
          FIELDS.forEach(key => {
            if (parsedData[key] !== undefined && parsedData[key] !== '') {
              state.formData[key] = parsedData[key];
              state.aiFilled[key] = true;
            }
          });
          displayText = replyText.replace(/```json\n[\s\S]*?\n```/, '').trim();
          updateFormUI();
        } catch (e) {
          console.error("JSON parsing error", e);
        }
      }

      state.messages.push({ role: 'assistant', content: displayText });
      state.isLoading = false;
      updateChatUI();
    }

    async function handleGenerateContent() {
      if (!state.formData.subject || !state.formData.topic || !state.formData.grade) {
        alert('請填寫教學科目、教學主題與適用年級！');
        return;
      }

      state.isGeneratingContent = true;
      toggleGenerateBtnLoading();

      const lessonPrompt = `我需要您以「資深課程設計專家」的角度，為【${state.formData.grade}】的學生設計一份專業、具備深度且實用的教案，科目為【${state.formData.subject}】，主題為【${state.formData.topic}】。

【核心設計參數】
- 教學風格與氛圍：${state.formData.style || '專業、清晰且具啟發性'}
- 預計授課時間：${state.formData.duration}
${state.formData.special ? `- 特殊需求與限制：${state.formData.special}` : ''}

【請直接產出這份客製化教案，請「務必保留以下大標題與子標題的骨架」，以確保教案格式標準化。請在骨架內發揮您的教育專業「自由生成」，內容需生動、具體且可執行，多善用列點排版】

# 課程教案大綱

## 一、 基本資料
(請由 AI 生成，需包含：科目 ${state.formData.subject} / 主題 ${state.formData.topic} / 對象 ${state.formData.grade} / 時間 ${state.formData.duration})

## 二、 設計理念與教學目標
(請由 AI 專業生成，說明設計理念並列出 3-4 點具體可測量的教學目標)

## 三、 教學準備
(請由 AI 專業生成，列出所需的教具與環境建議)

## 四、 教學流程（總時數：${state.formData.duration}）
(請務必依照以下三個階段規劃，並在各階段內詳細寫出具體步驟、教師提問、學生活動。請多用列點以保持排版清晰)

### 1. 引起動機 (請 AI 依照總時數合理分配時間)
(請由 AI 具體規劃：如何用生動的方式開場？有什麼具體的提問或小活動？)

### 2. 發展活動 (請 AI 依照總時數合理分配時間，可拆分為多個主要活動)
(請由 AI 具體規劃：詳細寫出操作步驟、教師講解重點、學生的實作或小組任務)

### 3. 綜合活動 (請 AI 依照總時數合理分配時間)
(請由 AI 具體規劃：如何收斂今日重點？進行隨堂小測驗、反思或指派延伸任務)

## 五、 評量方式
(請由 AI 專業生成，提供具體的評量項目與配分)

## 六、 教學省思建議
(請由 AI 專業生成，提供老師課後可以反思的幾個具體問題點)`.trim();

      const slidesPrompt = `延續我們針對【${state.formData.subject}】科目的【${state.formData.topic}】(${state.formData.grade}) 所設計的教案，我現在需要製作一份教學簡報 (PPT)。
請以簡報設計專家的角度，為我產出詳細的「簡報內容大綱」，讓我可以直接貼入 PPT 或是 AI 簡報工具 (如 Gamma/Canva) 中生成。

【核心設計參數】
- 簡報視覺與排版風格設定：${state.formData.presentationStyle || state.formData.style || '專業、清晰且具啟發性'}
- 建議總頁數：${state.formData.slideCount || '根據簡報內容自動調配'}
${state.formData.special ? `- 特殊需求與限制：${state.formData.special}` : ''}

【請直接產出簡報內容，使用 Markdown 格式】
請依據上述的頁數建議，自由發揮與規劃每一頁的內容 (Slide 1, Slide 2...)。
每一頁請務必包含：該頁的「標題」、「文案重點 (精簡有力)」與「視覺建議 (根據上述定義的簡報風格，給予 AI 生圖或排版設計的參考)」。

結尾請附上一段「整體視覺與配色建議」。`.trim();

      const [lessonContent, slidesContent] = await Promise.all([
        callGeminiAPI(lessonPrompt, true),
        callGeminiAPI(slidesPrompt, true)
      ]);

      state.generatedPrompts.lesson = lessonContent;
      state.generatedPrompts.slides = slidesContent;
      state.isGeneratingContent = false;
      
      toggleGenerateBtnLoading();
      updateOutputUI();
      
      // 平滑捲動到底部觀看結果
      setTimeout(() => {
        document.getElementById('output-container').scrollIntoView({ behavior: 'smooth' });
      }, 100);
    }

    function copyToClipboard(type) {
      const rawText = state.generatedPrompts[type];
      if (!rawText) return;

      const cleanText = rawText
        .replace(/\*\*(.*?)\*\*/g, '$1') 
        .replace(/^#+\s/gm, '')          
        .replace(/^(\s+)[\*\-]\s/gm, '$1◦ ') 
        .replace(/^[\*\-]\s/gm, '• ')    
        .replace(/\n{3,}/g, '\n\n')      
        .trim();

      // UI 變化
      const btn = document.getElementById(`btn-copy-${type}`);
      const iconCopy = document.getElementById(`icon-copy-${type}`);
      const iconCheck = document.getElementById(`icon-check-${type}`);
      const textSpan = document.getElementById(`text-copy-${type}`);

      const originalClasses = btn.className;
      btn.className = 'flex items-center gap-1.5 px-3 py-1.5 rounded-md text-sm font-medium transition-colors bg-green-100 text-green-700 dark:bg-green-900/50 dark:text-green-400';
      iconCopy.classList.add('hidden');
      iconCheck.classList.remove('hidden');
      textSpan.textContent = '已複製！';

      const resetUI = () => {
        btn.className = originalClasses;
        iconCopy.classList.remove('hidden');
        iconCheck.classList.add('hidden');
        textSpan.textContent = '複製內容';
      };

      try {
        navigator.clipboard.writeText(cleanText).then(
          () => setTimeout(resetUI, 2000),
          fallbackCopy
        );
      } catch (err) {
        fallbackCopy();
      }

      function fallbackCopy() {
        const textArea = document.createElement("textarea");
        textArea.value = cleanText;
        document.body.appendChild(textArea);
        textArea.select();
        try {
          document.execCommand('copy');
          setTimeout(resetUI, 2000);
        } catch (err) {
          console.error('Copy failed', err);
          resetUI();
        }
        document.body.removeChild(textArea);
      }
    }

    // ==========================================
    // 啟動應用程式
    // ==========================================
    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      initEvents();
      updateFormUI();
      updateChatUI();
    });

  </script>
